groups:
  - name: application
    rules:
      - alert: ApplicationDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application Down"

      - alert: DatabaseSlowQuery
        expr: pg_stat_activity_max_tx_duration > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Query database berjalan lebih dari 30 detik"
